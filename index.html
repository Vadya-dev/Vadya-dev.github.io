<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Егор и Ксюша - свадьба 3 октября 2026</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #efe6d8;
    }

    body {
      margin: 0;
      background: #efe6d8;
      color: #3f3433;
      font-family: Arial, sans-serif;
    }

    .page {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      background: #f7efe3;
      box-shadow: 0 18px 70px rgba(55, 16, 20, 0.16);
      overflow: hidden;
    }

    .slice {
      position: relative;
      margin: 0;
      padding: 0;
      line-height: 0;
      background: #f7efe3;
    }

    .slice + .slice {
      margin-top: -1px;
    }

    .slice img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    .button {
      position: absolute;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 4px;
      text-decoration: none;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(35, 0, 8, 0.18);
      outline: 0;
    }

    .button--map {
      left: 38.8%;
      top: 83.2%;
      width: 22.4%;
      height: 7.2%;
      color: #8a0018;
      background: #f7efe3;
      font-size: clamp(14px, 4vw, 22px);
    }

    .button--rsvp {
      left: 28.2%;
      top: 61.2%;
      width: 44.4%;
      height: 8.6%;
      color: #fff4df;
      background: #8a0018;
      font-size: clamp(12px, 3.45vw, 20px);
      white-space: nowrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      .page {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Приглашение на свадьбу Егора и Ксюши">
    <section class="slice" aria-label="Главный экран">
      <img src="assets/slices/hero.png" alt="Детские фотографии жениха и невесты. Да-да, это мы! Время пронеслось незаметно, и у этих двух ребят скоро свадьба.">
    </section>

    <section class="slice" aria-label="Фото Егора и Ксюши">
      <img src="assets/slices/couple.png" alt="Егор и Ксюша">
    </section>

    <section class="slice" aria-label="Дата свадьбы">
      <img src="assets/slices/date.png" alt="Приглашаем разделить с нами радостный день. Октябрь 2026, суббота, 3 число.">
    </section>

    <section class="slice" aria-label="Локация">
      <img src="assets/slices/location.png" alt="Локация: банкетный зал Олимп, Лесной тракт, 85.">
      <a
        class="button button--map"
        href="https://yandex.ru/maps/?text=%D0%91%D0%B0%D0%BD%D0%BA%D0%B5%D1%82%D0%BD%D1%8B%D0%B9%20%D0%B7%D0%B0%D0%BB%20%D0%9E%D0%BB%D0%B8%D0%BC%D0%BF%20%D0%9B%D0%B5%D1%81%D0%BD%D0%BE%D0%B9%20%D1%82%D1%80%D0%B0%D0%BA%D1%82%2085"
        target="_blank"
        rel="noreferrer"
      >Карта</a>
    </section>

    <section class="slice" aria-label="Расписание">
      <img src="assets/slices/schedule.png" alt="15:30 сбор гостей и фуршет, 16:00 выездная церемония, 17:00 праздничный ужин, 24:00 завершение вечера.">
    </section>

    <section class="slice" aria-label="Дресс-код и анкета гостя">
      <img src="assets/slices/rsvp.png" alt="Дресс-код: бордо, нежно-оливковый, зелёный, бежевый. Анкета гостя.">
      <a
        class="button button--rsvp"
        href="https://forms.yandex.ru/u/6a412eb790fa7b34b5189a3d/"
        target="_blank"
        rel="noreferrer"
      >Подтвердить участие</a>
    </section>

    <div class="sr-only">
      <h1>Егор и Ксюша приглашают на свадьбу</h1>
      <p>Свадьба состоится 3 октября 2026 года.</p>
      <p>Адрес: банкетный зал «Олимп», Лесной тракт, 85.</p>
      <p>Расписание: 15:30 сбор гостей и фуршет, 16:00 выездная церемония, 17:00 праздничный ужин, 24:00 завершение вечера.</p>
    </div>
  </main>
</body>
</html>
